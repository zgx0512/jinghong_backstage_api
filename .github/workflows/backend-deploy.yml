name: 后端自动部署

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 远程更新并重启
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/jinghong_backstage_api
            git pull origin master
            npm ci
            pm2 restart jinghong-api
            pm2 restart mock-order
            pm2 save
            echo "✅ 后端部署完成"